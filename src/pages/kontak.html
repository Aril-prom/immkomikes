<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title udah dinamis, gk perlu diisi -->
    <title></title>

    <!-- favicons -->
    <link rel="icon" href="../images/logo.png" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- Global CSS -->
    <link rel="stylesheet" href="../styles/global.css" />
    <!-- Custom CSS | Header -->
    <link rel="stylesheet" href="../styles/header.css" />

    <script>
      // === WEBSITE CONFIGURATION ===
      window.siteConfig = {
        brand: {
          name: "Minaperkasa",
          href: "/",
          description: "Organisasi Pengusaha Ikan Indonesia",
        },
        navigation: [
          {
            label: "Beranda",
            href: "/",
            id: "beranda",
            active: true,
          },
          {
            label: "Produk",
            href: "./produk.html",
            id: "produk",
            active: false,
          },
          {
            label: "Tentang Kami",
            href: "/src/pages/tentang-kami.html",
            id: "tentang",
            active: false,
          },
          {
            label: "Blog",
            href: "/src/pages/blog.html",
            id: "blog",
            active: false,
          },
          {
            label: "Kontak",
            href: "/src/pages/kontak.html",
            id: "kontak",
            active: false,
          },
        ],
        cta: {
          text: "Pesan Sekarang",
          href: "https://wa.me/6281477023649?text=Halo%20Minaperkasa%2C%20saya%20tertarik%20untuk%20membeli%20produk",
          icon: "fab fa-whatsapp",
        },
        pageContent: {
          title: "Kontak",
          subtitle: "Halaman kontak",
        },
      };

      // === Dynamic Title ===
      document.addEventListener("DOMContentLoaded", () => {
        const path = window.location.pathname;

        if (path === "/" || path === "/index.html") {
          document.title = "Home - Minaperkasa";
        } else if (path === "/src/pages/produk.html") {
          document.title = "Produk Kami - Minaperkasa";
        } else if (path === "/src/pages/tentang-kami.html") {
          document.title = "Tentang Kami - Minaperkasa";
        } else if (path === "/src/pages/blog.html") {
          document.title = "Blog - Minaperkasa";
        } else if (path === "/src/pages/kontak.html") {
          document.title = "Kontak - Minaperkasa";
        } else if (path === "/checkout.html") {
          document.title = "Checkout - Minaperkasa";
        } else {
          document.title = "Minaperkasa - Pilihan Keluarga Indonesia";
        }
      });
    </script>
  </head>
  <body>
    <!-- Header Section -->
    <header class="header_section">
      <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container">
          <!-- Brand Logo -->
          <a class="navbar-brand" href="/" id="brand-logo">
            <img src="../images/logo.png" alt="logo minaperkasa" />
            <span id="brand-name"><!-- Will be populated by JS --></span>
          </a>

          <!-- Mobile Toggle Button -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon">
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
            </span>
          </button>

          <!-- Navigation Menu -->
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto" id="main-navigation">
              <!-- Navigation items will be populated by JS -->
            </ul>

            <!-- CTA Button -->
            <div class="d-flex">
              <a href="#" class="cta-button" id="cta-button" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span><!-- Will be populated by JS --></span>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Content Area -->
    <main>
      <div class="container mt-5">
        <div class="row">
          <div class="col-12">
            <h1 id="page-title"><!-- Will be populated by JS --></h1>
            <p id="page-subtitle"><!-- Will be populated by JS --></p>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../scripts/header.js"></script>
  </body>
</html>
